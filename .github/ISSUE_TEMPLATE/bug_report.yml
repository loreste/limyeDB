name: Bug Report
description: Report a bug to help us improve LimyeDB
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start the server with '...'
        2. Run query '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LimyeDB Version
      description: The version of LimyeDB you are using.
      placeholder: e.g., v1.2.3
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: The operating system where the issue occurs.
      options:
        - Linux
        - macOS
        - Windows
        - Docker
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: The version of Go used to build or run LimyeDB.
      placeholder: e.g., 1.22.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output or error messages.
      render: shell
    validations:
      required: false
