name: LimyeDB CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m ./pkg/... ./internal/... ./api/rest/... ./cmd/limyedb-cli/...

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        go-version: [ '1.26.x' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      run: go build -v ./pkg/... ./internal/... ./api/rest/... ./cmd/limyedb-cli/...

    - name: Test with Coverage
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./pkg/... ./internal/... ./api/rest/... ./cmd/limyedb-cli/...

    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.26.x'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-limyedb
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Vet
      run: go vet ./pkg/... ./internal/... ./api/rest/... ./cmd/limyedb-cli/...
