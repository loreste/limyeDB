name: LimyeDB CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: latest
        args: --timeout=5m --exclude-dirs=api/grpc

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Get packages (excluding api/grpc)
      id: packages
      run: echo "pkgs=$(go list ./... | grep -v 'api/grpc' | tr '\n' ' ')" >> $GITHUB_OUTPUT

    - name: Build
      run: go build -v ${{ steps.packages.outputs.pkgs }}

    - name: Test with Coverage
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ${{ steps.packages.outputs.pkgs }}

    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.26.x'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-limyedb
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Vet
      run: go vet ${{ steps.packages.outputs.pkgs }}
