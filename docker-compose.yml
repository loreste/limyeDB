version: '3.8'

services:
  limyedb:
    build:
      context: .
      dockerfile: Dockerfile
    image: limyedb/limyedb:latest
    container_name: limyedb
    restart: unless-stopped
    ports:
      - "8080:8080"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - limyedb_data:/data
      - ./config.yaml:/config/config.yaml:ro
    environment:
      - LIMYEDB_LOG_LEVEL=info
      - LIMYEDB_AUTH_TOKEN=${LIMYEDB_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: limyedb-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - limyedb

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: limyedb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # Jaeger for tracing (optional)
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: limyedb-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    profiles:
      - tracing

volumes:
  limyedb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: limyedb-network
