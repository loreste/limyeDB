version: '3.8'

# LimyeDB Cluster Configuration
# Deploy a 3-node cluster with high availability

x-limyedb-common: &limyedb-common
  build:
    context: .
    dockerfile: Dockerfile
  image: limyedb/limyedb:latest
  restart: unless-stopped
  networks:
    - limyedb-cluster
  environment:
    - LIMYEDB_LOG_LEVEL=info
    - LIMYEDB_AUTH_TOKEN=${LIMYEDB_AUTH_TOKEN:-cluster_secret}

services:
  # Node 1 - Bootstrap Leader
  limyedb-node1:
    <<: *limyedb-common
    container_name: limyedb-node1
    hostname: limyedb-node1
    ports:
      - "8081:8080"
      - "6335:6334"
    volumes:
      - node1_data:/data
    command:
      - "--rest-addr=0.0.0.0:8080"
      - "--grpc-addr=0.0.0.0:6334"
      - "--data-dir=/data"
      - "--raft-node-id=node1"
      - "--raft-bind=0.0.0.0:7000"
      - "--raft-bootstrap=true"
      - "--gossip-bind=0.0.0.0:7001"

  # Node 2 - Follower
  limyedb-node2:
    <<: *limyedb-common
    container_name: limyedb-node2
    hostname: limyedb-node2
    ports:
      - "8082:8080"
      - "6336:6334"
    volumes:
      - node2_data:/data
    command:
      - "--rest-addr=0.0.0.0:8080"
      - "--grpc-addr=0.0.0.0:6334"
      - "--data-dir=/data"
      - "--raft-node-id=node2"
      - "--raft-bind=0.0.0.0:7000"
      - "--raft-join=http://limyedb-node1:8080"
      - "--gossip-bind=0.0.0.0:7001"
      - "--gossip-seeds=limyedb-node1:7001"
    depends_on:
      limyedb-node1:
        condition: service_healthy

  # Node 3 - Follower
  limyedb-node3:
    <<: *limyedb-common
    container_name: limyedb-node3
    hostname: limyedb-node3
    ports:
      - "8083:8080"
      - "6337:6334"
    volumes:
      - node3_data:/data
    command:
      - "--rest-addr=0.0.0.0:8080"
      - "--grpc-addr=0.0.0.0:6334"
      - "--data-dir=/data"
      - "--raft-node-id=node3"
      - "--raft-bind=0.0.0.0:7000"
      - "--raft-join=http://limyedb-node1:8080"
      - "--gossip-bind=0.0.0.0:7001"
      - "--gossip-seeds=limyedb-node1:7001,limyedb-node2:7001"
    depends_on:
      limyedb-node1:
        condition: service_healthy
      limyedb-node2:
        condition: service_healthy

  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: limyedb-lb
    restart: unless-stopped
    ports:
      - "8080:80"
      - "6334:6334"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - limyedb-node1
      - limyedb-node2
      - limyedb-node3
    networks:
      - limyedb-cluster

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: limyedb-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus-cluster.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - limyedb-cluster

  # Grafana
  grafana:
    image: grafana/grafana:10.1.0
    container_name: limyedb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    networks:
      - limyedb-cluster

volumes:
  node1_data:
  node2_data:
  node3_data:
  prometheus_data:
  grafana_data:

networks:
  limyedb-cluster:
    driver: bridge
