# Codecov configuration for LimyeDB
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: false

    patch:
      default:
        target: 80%
        threshold: 5%
        informational: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "**/*_test.go"
  - "**/mock_*.go"
  - "**/*.pb.go"
  - "vendor/**"
  - "cmd/**"
  - "examples/**"
  - "docs/**"

flags:
  unittests:
    paths:
      - pkg/
    carryforward: true
