version: 2

project_name: limyedb

before:
  hooks:
    - go mod tidy

builds:
  - id: limyedb
    main: ./cmd/limyedb
    binary: limyedb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/limyedb/limyedb/pkg/version.Version={{.Version}}
      - -X github.com/limyedb/limyedb/pkg/version.Commit={{.Commit}}
      - -X github.com/limyedb/limyedb/pkg/version.BuildTime={{.Date}}

  - id: limyedb-cli
    main: ./cmd/limyedb-cli
    binary: limyedb-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/limyedb/limyedb/pkg/version.Version={{.Version}}
      - -X github.com/limyedb/limyedb/pkg/version.Commit={{.Commit}}
      - -X github.com/limyedb/limyedb/pkg/version.BuildTime={{.Date}}

archives:
  - id: limyedb-archive
    builds:
      - limyedb
      - limyedb-cli
    format_overrides:
      - goos: darwin
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers:
  - image_templates:
      - "limyedb/limyedb:{{ .Tag }}"
      - "limyedb/limyedb:v{{ .Major }}"
      - "limyedb/limyedb:v{{ .Major }}.{{ .Minor }}"
      - "limyedb/limyedb:latest"
    ids:
      - limyedb
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/amd64"

release:
  github:
    owner: limyedb
    name: limyedb
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
