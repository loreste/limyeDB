version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      path: stdout
  show-stats: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/limyedb/limyedb
  exclusions:
    generated: strict
    paths:
      - api/grpc

linters:
  default: none
  enable:
    - gosec
    - bodyclose
    - errcheck
    - errorlint
    - staticcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - nilerr
    - nilnil

  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
        - G115

    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - io.Copy
        - io.WriteTo
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (*bufio.Writer).Flush
        - (*compress/gzip.Reader).Close
        - (*compress/gzip.Writer).Close
        - (*archive/tar.Writer).Close
        - os.Remove

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    staticcheck:
      checks:
        - all
        - "-SA9003"
        - "-ST1000"   # package comments
        - "-ST1003"   # naming conventions (ALL_CAPS, underscores)
        - "-ST1005"   # error string capitalization
        - "-ST1020"   # comment format on methods
        - "-ST1021"   # comment format on types
        - "-ST1023"   # omit type from declaration
        - "-S1009"    # omit nil check before len
        - "-QF1003"   # tagged switch
        - "-QF1011"   # omit type from declaration
        - "-SA4006"   # unused value
        - "-SA4017"   # pure function return ignored

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    misspell:
      locale: US

  exclusions:
    generated: strict
    paths:
      - api/grpc
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
          - errorlint
          - nilerr
          - nilnil

      - path: \.pb\.go$
        linters:
          - all

      - linters:
          - gosec
        text: "G304:"

      - linters:
          - gosec
        text: "G404:"

      - linters:
          - gosec
        text: "G118:"

severity:
  default: warning
  rules:
    - linters:
        - gosec
      severity: error
    - linters:
        - errcheck
      severity: warning
