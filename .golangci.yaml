version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  exclude-dirs:
    - api/grpc

output:
  formats:
    text:
      path: stdout
  show-stats: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/limyedb/limyedb

linters:
  default: none
  enable:
    - gosec
    - bodyclose
    - errcheck
    - errorlint
    - staticcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - nilerr
    - nilnil

  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
      config:
        global:
          audit: enabled

    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - io.Copy
        - io.WriteTo
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (*bufio.Writer).Flush

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    staticcheck:
      checks:
        - all
        - "-SA9003"

    govet:
      enable-all: true
      disable:
        - fieldalignment

    misspell:
      locale: US

  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose

      - path: \.pb\.go$
        linters:
          - all

      - path: mock_.*\.go$
        linters:
          - all

      - path: vendor/
        linters:
          - all

      - linters:
          - gosec
        text: "G304:"

      - linters:
          - gosec
        text: "G404:"

severity:
  default: warning
  rules:
    - linters:
        - gosec
      severity: error
    - linters:
        - errcheck
      severity: warning
