events {
    worker_connections 1024;
}

http {
    upstream limyedb_cluster {
        least_conn;
        server limyedb-node1:8080 weight=1;
        server limyedb-node2:8080 weight=1;
        server limyedb-node3:8080 weight=1;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /health {
            proxy_pass http://limyedb_cluster/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # Metrics - only route to leader for consistency
        location /metrics {
            proxy_pass http://limyedb-node1:8080/metrics;
        }

        # All other requests
        location / {
            proxy_pass http://limyedb_cluster;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

stream {
    upstream limyedb_grpc {
        least_conn;
        server limyedb-node1:6334;
        server limyedb-node2:6334;
        server limyedb-node3:6334;
    }

    server {
        listen 6334;
        proxy_pass limyedb_grpc;
        proxy_connect_timeout 30s;
        proxy_timeout 300s;
    }
}
