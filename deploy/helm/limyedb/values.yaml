# Default values for limyedb Helm chart.

replicaCount: 1

image:
  repository: limyedb/limyedb
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# LimyeDB server configuration
config:
  server:
    rest_address: ":8080"
    grpc_address: ":50051"
    read_timeout: "30s"
    write_timeout: "30s"
    max_request_size: 67108864
  storage:
    data_dir: "/data"
    max_collections: 1000
    mmap_enabled: true
    flush_interval_ms: 1000
  hnsw:
    m: 16
    ef_construction: 200
    ef_search: 100
    max_elements: 100000
  wal:
    enabled: true
    dir: "/data/wal"
    segment_size_mb: 64
    sync_on_write: true
  snapshot:
    dir: "/data/snapshots"
    interval_sec: 3600
    retain_count: 5
    compression_level: 6

# Authentication
auth:
  # Enable bearer-token authentication
  enabled: false
  # Master bearer token (set via secret in production)
  token: ""

# TLS configuration
tls:
  enabled: false
  certPath: ""
  keyPath: ""

# Service configuration
service:
  type: ClusterIP
  restPort: 8080
  grpcPort: 50051

# Persistence
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}

# Resource limits and requests
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthz
    port: rest
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: rest
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Pod-level security context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

# Container-level security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

serviceAccount:
  create: false
  name: ""
  annotations: {}
